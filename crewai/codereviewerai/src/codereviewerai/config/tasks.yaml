static_analysis_task:
  description: >
    Perform a static analysis of the repository defined in {path}.

    Required execution order:
    1. Use the project-reading tool to resolve the repository URL from {path}.
    2. Clone the repository locally.
    3. Inspect the repository structure.
    4. Read important configuration files such as pyproject.toml, setup.cfg,
       package.json, tsconfig.json, pom.xml, build.gradle, or equivalent if present.
    5. Run the static-analysis tool and collect deterministic findings.
    6. Read only the files necessary to validate, explain, and prioritize the findings.

    Focus on:
    - style violations
    - complexity hotspots
    - maintainability problems
    - duplicated or suspicious structure
    - oversized files or functions/classes when visible from the findings

    Do not speculate. Every finding must reference affected files or directories.
  expected_output: >
    A markdown report with these sections:
    1. Executive Summary
    2. Findings
    3. Hotspots
    4. Recommendations

    For each finding include:
    - title
    - severity (low/medium/high)
    - affected file(s)
    - evidence
    - recommendation

    Formatted as markdown without '```'
  agent: static_analyst

