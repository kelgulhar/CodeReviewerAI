prepare_repo_task:
  description: >
    Use the MCP tool prepare_repository with {path}.
    Return the structured setup result only.
  expected_output: >
    A structured JSON object with:
    - repo_url
    - repo_path
    - repo_tree
    - manifest_summary
  agent: repo_setup_agent

static_analysis_task:
  description: >
    Use the repo_path from prepare_repo_task as the only repository location.
    Do not use the original input path for analysis.
    First inspect the prepared repository context from prepare_repo_task.
    Then perform the static analysis on that prepared local repository.
    Use FileReadTool or the MCP tools only for validation and explanation of findings.
    If execution fails, report the failure instead of inventing findings.
  expected_output: >
    A markdown report with:
    1. Executive Summary
    2. Findings
    3. Hotspots
    4. Recommendations
    Formatted as markdown without '```'
  agent: static_analyst
  context:
    - prepare_repo_task

security_review_task:
  description: >
    Use the repo_path from prepare_repo_task as the only repository location.
    Do not use the original input path for security review.
    First inspect the prepared repository context from prepare_repo_task.
    Then use MCP tools to inspect security-relevant files, dependency definitions,
    configuration, secrets handling, authentication or authorization related code,
    and external integration points in the prepared repository.
    Validate each finding against concrete repository evidence before reporting it.
    Focus on hardcoded secrets, insecure defaults, injection risks, unsafe
    deserialization, weak input validation, access control issues, and sensitive
    data exposure.
    If execution fails, report the failure instead of inventing findings.
  expected_output: >
    A markdown report with:
    1. Security Summary
    2. Confirmed Findings
    3. Risky Areas Requiring Attention
    4. Severity Assessment
    5. Recommended Remediations
    Formatted as markdown without '```'
  agent: security_reviewer
  context:
    - prepare_repo_task
    - static_analysis_task

architecture_design_review_task:
  description: >
    Use the repo_path from prepare_repo_task as the only repository location.
    Do not use the original input path for architecture review.
    Start from the prepared repository context and inspect structure, boundaries,
    coupling, and modularity.
    If execution fails, report the failure instead of inventing findings.
  expected_output: >
    A markdown report with:
    1. Architecture Overview
    2. Structural Strengths
    3. Structural Weaknesses
    4. Architectural Hotspots
    5. Refactoring Recommendations
    Formatted as markdown without '```'
  agent: architecture_design_analyst
  context:
    - prepare_repo_task
    - static_analysis_task

performance_analysis_task:
  description: >
    Use the repo_path from prepare_repo_task as the only repository location.
    Do not use the original input path for performance analysis.
    First inspect the prepared repository context from prepare_repo_task and use
    the outputs from static_analysis_task and architecture_design_review_task to
    identify likely runtime and scalability hotspots.
    Focus on inefficient algorithms, repeated work, nested loops, avoidable
    recomputation, blocking I/O, excessive parsing or allocation, inefficient
    data processing, and likely bottlenecks in request, batch, or pipeline flows.
    Distinguish clearly between confirmed inefficiencies and likely hotspots.
    If execution fails, report the failure instead of inventing findings.
  expected_output: >
    A markdown report with:
    1. Performance Summary
    2. Confirmed Inefficiencies
    3. Likely Hotspots
    4. Scalability Risks
    5. Optimization Recommendations
    Formatted as markdown without '```'
  agent: performance_optimizer
  context:
    - prepare_repo_task
    - static_analysis_task
    - architecture_design_review_task

code_quality_documentation_task:
  description: >
    Use the repo_path from prepare_repo_task as the only repository location.
    Do not use the original input path for code quality and documentation review.
    First inspect the prepared repository context from prepare_repo_task.
    Then review readability, maintainability, consistency, and documentation
    quality across the most relevant source files and developer-facing documents.
    Focus on naming clarity, overly long or multi-purpose functions, duplicated
    logic, weak abstractions, inconsistent conventions, missing docstrings,
    misleading comments, and gaps in README or usage documentation.
    Use the results from static_analysis_task and architecture_design_review_task
    as supporting context, but validate findings against concrete repository evidence.
    If execution fails, report the failure instead of inventing findings.
  expected_output: >
    A markdown report with:
    1. Code Quality Summary
    2. Readability Findings
    3. Maintainability Concerns
    4. Documentation Gaps
    5. Refactoring Recommendations
    Formatted as markdown without '```'
  agent: code_quality_documentation_agent
  context:
    - prepare_repo_task
    - static_analysis_task
    - architecture_design_review_task

test_coverage_analysis_task:
  description: >
    Use the repo_path from prepare_repo_task as the only repository location.
    Do not use the original input path for test coverage analysis.
    First inspect the prepared repository context from prepare_repo_task and
    identify the available test structure, test frameworks, and coverage-related
    signals in the repository.
    Then compare important production modules, critical logic paths, and boundary
    components against existing tests to identify likely gaps.
    Focus on untested business logic, missing edge-case validation, missing
    negative-path tests, weak assertions, fragile test structure, and missing
    integration coverage for important boundaries.
    Do not claim exact coverage percentages unless directly supported by repository evidence.
    If execution fails, report the failure instead of inventing findings.
  expected_output: >
    A markdown report with:
    1. Test Coverage Summary
    2. Existing Test Signals
    3. Coverage Gaps
    4. Risk Areas
    5. Recommended High-Value Test Cases
    Formatted as markdown without '```'
  agent: test_coverage_agent
  context:
    - prepare_repo_task
    - static_analysis_task
    - architecture_design_review_task