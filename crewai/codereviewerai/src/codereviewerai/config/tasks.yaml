architecture_design_review_task:
  description: >
    Perform an architecture and design review of the repository defined in {path}.

    Required execution order:
    1. Use the project-reading tool to resolve the repository URL from {path}.
    2. Clone the repository locally.
    3. Inspect the full directory structure.
    4. Read the key configuration, bootstrap, routing, dependency, and module entry files.
    5. Evaluate architectural layering, separation of concerns, coupling,
       dependency direction, abstraction quality, and module boundaries.
    6. Use the static analysis results as supporting context, but do not repeat them
       unless they are architecturally relevant.

    Focus especially on:
    - business logic in the wrong layer
    - oversized modules/classes
    - weak module boundaries
    - missing abstractions
    - tight coupling
    - unclear ownership of responsibilities
    - maintainability risks caused by structure

    Do not speculate. Ground every conclusion in repository structure and concrete files.
  expected_output: >
    A markdown architecture review with these sections:
    1. Architecture Overview
    2. Structural Strengths
    3. Structural Weaknesses
    4. Architectural Hotspots
    5. Refactoring Recommendations

    For each weakness include:
    - title
    - severity (low/medium/high)
    - affected file(s) or module(s)
    - reasoning
    - recommendation

    Formatted as markdown without '```'
  agent: architecture_design_analyst
  context:
    - static_analysis_task

