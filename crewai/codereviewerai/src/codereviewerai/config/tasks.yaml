prepare_repo_task:
  description: >
    Use the MCP tool prepare_repository with {path}.
    Return the structured setup result only.
  expected_output: >
    A structured JSON object with:
    - repo_url
    - repo_path
    - repo_tree
    - manifest_summary
  agent: repo_setup_agent

static_analysis_task:
  description: >
    Use the repo_path from prepare_repo_task as the only repository location.
    Do not use the original input path for analysis.
    First inspect the prepared repository context from prepare_repo_task.
    Then perform the static analysis on that prepared local repository.
    Use FileReadTool or the MCP tools only for validation and explanation of findings.
    If execution fails, report the failure instead of inventing findings.
  expected_output: >
    A markdown report with:
    1. Executive Summary
    2. Findings
    3. Hotspots
    4. Recommendations
    Formatted as markdown without '```'
  agent: static_analyst
  context:
    - prepare_repo_task

