static_analysis_task:
  description: >
    Perform a static code analysis of project defined in {path} and identify issues related to
    maintainability, style compliance, and code structure.
    Focus especially on unused variables, complex functions, code smells,
    and style violations.
  expected_output: >
    A structured list of static analysis findings for project defined in {path}, including the
    issue type, affected code area, severity, and a short recommendation for
    improvement.
    Formatted as markdown without '```'
  agent: static_analyst

security_review_task:
  description: >
    Review the codebase defined in {path} for potential security vulnerabilities and risky coding
    practices that may not always be detected by traditional static analysis tools.
    Focus especially on insecure APIs, hardcoded secrets, injection risks,
    insecure deserialization, and weaknesses in authentication or authorization logic.
  expected_output: >
    A structured security review of the codebase defined in {path} listing identified vulnerabilities,
    their potential impact, affected code areas, severity, and recommended remediation steps.
    Formatted as markdown without '```'
  agent: security_reviewer
#
architecture_design_review_task:
  description: >
    Analyze the architecture and design of the codebase defined in {path} with respect to modularity,
    separation of concerns, code coupling, abstraction quality, and maintainability.
    Pay special attention to oversized classes, business logic inside controllers,
    missing abstractions, and excessive dependencies.
  expected_output: >
    A detailed architecture and design assessment of the codebase defined in {path}, including key
    structural weaknesses, examples of problematic design decisions, and concrete
    recommendations for improving modularity and maintainability.
    Formatted as markdown without '```'
  agent: architecture_design_analyst
#
performance_analysis_task:
  description: >
    Analyze the codebase defined in {path} for potential performance bottlenecks and inefficient
    implementation patterns.
    Focus on inefficient algorithms, unnecessary database queries, O(n²) patterns,
    and avoidable overhead in loops or data processing.
  expected_output: >
    A performance analysis report for the codebase defined in {path} describing possible bottlenecks,
    inefficient code paths, their likely runtime impact, and practical optimization suggestions.
    Formatted as markdown without '```'
  agent: performance_optimizer
#
code_quality_documentation_task:
  description: >
    Review the readability, maintainability, documentation quality, and test coverage of the codebase defined in {path}.
    Focus on naming conventions, code clarity, missing documentation, long functions,
    missing docstrings, and general refactoring opportunities.
    Also analyze the current test coverage and identify critical code paths
    that are insufficiently tested or completely untested.
    Suggest high-value unit and integration test cases that would improve confidence
    in the system.
  expected_output: >
    A code quality, documentation, and test coverage review for the codebase defined in {path}, including readability issues,
    maintainability concerns, missing documentation, test coverage gaps,
    risk areas caused by missing tests, and concrete refactoring suggestions with a prioritized list of recommended test cases.
    Formatted as markdown without '```'
  agent: code_quality_documentation_agent